  <rect x="179.8" y="368.2" width="170.0" height="58" rx="18" fill="#FFFFFF" stroke="#AB1F29" stroke-width="2"/>
  <text x="264.8" y="402.9" text-anchor="middle" font-size="17" font-weight="bold" fill="#2B2B2B">修正结论</text>
  <line x1="343.8" y1="375.9" x2="451.0" y2="347.2" stroke="#44546A" stroke-width="2"/>
  <polygon points="451.0,347.2 443.2,355.0 440.4,344.3" fill="#44546A"/>
</g>
  <g id="content-overlay">
  
  </g>
  <g id="side-notes">
