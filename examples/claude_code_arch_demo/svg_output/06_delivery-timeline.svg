<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <g id="bg"><rect width="1280" height="720" fill="#FFFFFF"/></g>
  <g id="bg-surface">
    <rect x="56" y="96" width="1168" height="608" rx="12" fill="#FFFFFF" fill-opacity="0.92" stroke="#E0E0E0" stroke-width="1"/>
  </g>
  <g id="header">
    <rect x="88" y="132" width="6" height="40" fill="#AB1F29"/>
    <text x="108" y="162" font-size="30" font-weight="bold" fill="#2B2B2B" font-family="'Arial Black', 'Microsoft YaHei', Arial, sans-serif">Claude Code 架构解析</text>
    <line x1="88" y1="190" x2="1192" y2="190" stroke="#E0E0E0" stroke-width="1"/>
    <text x="1192" y="162" text-anchor="end" font-size="14" fill="#AB1F29" font-family="'Microsoft YaHei', Arial, sans-serif">Part 6 · Delivery</text>
  </g>
  <g id="content-lead">
    <text x="120" y="228" font-size="24" font-weight="bold" fill="#2B2B2B" font-family="'Microsoft YaHei', Arial, sans-serif">一次交付的时间序列</text>
    <text x="120" y="254" font-size="17" fill="#6E6E73" font-family="'Microsoft YaHei', Arial, sans-serif">完整交付通常遵循固定节奏：读、想、改、测、交付，每一步都留下可核对痕迹。</text>
  </g>
  <g id="layout-timeline" data-layout="timeline" font-family="'Microsoft YaHei', Arial, sans-serif">
  <line x1="120" y1="429.0" x2="940" y2="429.0" stroke="#44546A" stroke-width="3"/>
  <rect x="98.0" y="407.0" width="44" height="44" rx="22" fill="#FFFFFF" stroke="#AB1F29" stroke-width="2"/>
  <text x="120.0" y="436.0" text-anchor="middle" font-size="16" font-weight="bold" fill="#AB1F29">1</text>
  <text x="120.0" y="506.4" text-anchor="middle" font-size="16" font-weight="bold" fill="#2B2B2B">读取代码</text>
  <rect x="303.0" y="407.0" width="44" height="44" rx="22" fill="#FFFFFF" stroke="#AB1F29" stroke-width="2"/>
  <text x="325.0" y="436.0" text-anchor="middle" font-size="16" font-weight="bold" fill="#AB1F29">2</text>
  <text x="325.0" y="378.4" text-anchor="middle" font-size="16" font-weight="bold" fill="#2B2B2B">制定计划</text>
  <rect x="508.0" y="407.0" width="44" height="44" rx="22" fill="#FFFFFF" stroke="#AB1F29" stroke-width="2"/>
  <text x="530.0" y="436.0" text-anchor="middle" font-size="16" font-weight="bold" fill="#AB1F29">3</text>
  <text x="530.0" y="506.4" text-anchor="middle" font-size="16" font-weight="bold" fill="#2B2B2B">编辑实现</text>
  <rect x="713.0" y="407.0" width="44" height="44" rx="22" fill="#FFFFFF" stroke="#AB1F29" stroke-width="2"/>
  <text x="735.0" y="436.0" text-anchor="middle" font-size="16" font-weight="bold" fill="#AB1F29">4</text>
  <text x="735.0" y="378.4" text-anchor="middle" font-size="16" font-weight="bold" fill="#2B2B2B">测试验证</text>
  <rect x="918.0" y="407.0" width="44" height="44" rx="22" fill="#AB1F29" stroke="#AB1F29" stroke-width="2"/>
  <text x="940.0" y="436.0" text-anchor="middle" font-size="16" font-weight="bold" fill="#FFFFFF">5</text>
  <text x="940.0" y="506.4" text-anchor="middle" font-size="16" font-weight="bold" fill="#2B2B2B">总结交付</text>
</g>
  <g id="content-overlay">
  
  </g>
  <g id="side-notes">
  <rect x="978" y="292" width="190" height="86" rx="14" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
  <text x="996" y="320" font-size="15" font-weight="bold" fill="#AB1F29" font-family="'Microsoft YaHei', Arial, sans-serif">证据链</text>
  <text x="996" y="346" font-size="14" fill="#2B2B2B" font-family="'Microsoft YaHei', Arial, sans-serif">改动、测试、状态检查共同构成</text>
  <text x="996" y="365" font-size="14" fill="#2B2B2B" font-family="'Microsoft YaHei', Arial, sans-serif">交付证据</text>
  <rect x="978" y="420" width="190" height="86" rx="14" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
  <text x="996" y="448" font-size="15" font-weight="bold" fill="#AB1F29" font-family="'Microsoft YaHei', Arial, sans-serif">落脚点</text>
  <text x="996" y="474" font-size="14" fill="#2B2B2B" font-family="'Microsoft YaHei', Arial, sans-serif">不是看起来完成，而是被验证完</text>
  <text x="996" y="493" font-size="14" fill="#2B2B2B" font-family="'Microsoft YaHei', Arial, sans-serif">成</text>
  </g>
  <g id="footer">
    <text x="1192" y="696" text-anchor="end" font-size="13" fill="#999999" font-family="'Microsoft YaHei', Arial, sans-serif">06 / 06</text>
  </g>
</svg>
